# OctoMap Server parameters for Scout robot with Gazebo Ignition
# Use with: ros2 launch octomap_server octomap_scout_ignition.launch.py

octomap_server:
  ros__parameters:
    # Frame configuration
    # Use 'odom' as fixed frame (Gazebo publishes odom->base_footprint TF)
    # Change to 'map' if using LIO-SAM or other SLAM that publishes map->odom
    frame_id: "odom"
    base_frame_id: "base_footprint"

    # Resolution of the OctoMap (meters per voxel)
    resolution: 0.05

    # Sensor model parameters
    sensor_model.max_range: 20.0          # OS1-64 max range
    sensor_model.hit: 0.7                 # Probability update on hit
    sensor_model.miss: 0.4                # Probability update on miss
    sensor_model.min: 0.12                # Minimum probability (clamping)
    sensor_model.max: 0.97                # Maximum probability (clamping)

    # Point cloud filtering (z-axis, relative to base_footprint)
    point_cloud_min_z: -5.0               # Filter points below this height (include floor)
    point_cloud_max_z: 5.0                # Filter points above this height

    # Occupancy grid filtering for 2D projection
    occupancy_min_z: -5.0                 # Minimum z for 2D projection (include floor)
    occupancy_max_z: 5.0                  # Maximum z for 2D projection

    # Ground plane filtering
    filter_ground_plane: true
    ground_filter.distance: 0.1           # Distance threshold for ground detection
    ground_filter.angle: 0.15             # Angular threshold from horizontal
    ground_filter.plane_distance: 0.1     # Max distance from z=0 for ground

    # Visualization
    use_height_map: true                  # Color by height in visualization
    colored_map: false                    # Use point cloud colors (if available)

    # Performance
    filter_speckles: false                # Filter isolated voxels
    compress_map: true                    # Compress map for publishing

    # Publish options
    publish_free_space: false             # Publish free space markers
    latch: true                           # Latch published maps

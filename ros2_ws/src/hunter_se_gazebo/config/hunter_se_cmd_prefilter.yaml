hunter_se_cmd_prefilter:
  ros__parameters:
    publish_rate_hz: 50.0
    command_timeout_sec: 0.5
    input_delay_sec: 0.05
    wheelbase_m: 0.547696
    # Command-side steering overdrive to offset Gazebo understeer. The logger
    # still evaluates against the real Hunter SE target of 18.8168465 deg
    # center / 22 deg inner.
    steering_limit_deg: 19.95
    steering_rate_deg_s: 315.789
    min_speed_for_steering_mps: 0.15
    speed_lag_tau_sec: 0.25
    accel_limit_mps2: 2.0
    brake_decel_mps2: 3.0
    deadband_speed_mps: 0.02
    max_speed_mps: 1.333
    odom_topic: /odometry
    overspeed_deadband_mps: 0.01
    speed_governor_gain: 2.5

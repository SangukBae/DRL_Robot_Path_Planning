hyperparameters:
  batch_size: 256
  buffer_size: 1000000
  discount: 0.99
  target_update_rate: 250
  exploration_noise: 1.0
  exploration_noise_min: 0.1
  exploration_noise_decay_steps: 500000

  target_policy_noise: 0.2
  noise_clip: 0.5
  policy_freq: 2

  alpha: 0.4
  min_priority: 1

  max_eps_when_checkpointing: 20
  steps_before_checkpointing: 750000
  reset_weight: 0.9

  zs_dim: 256
  enc_hdim: 256
  enc_activ: "elu"
  encoder_lr: 0.0003

  critic_hdim: 256
  critic_activ: "elu"
  critic_lr: 0.0003

  actor_hdim: 256
  actor_activ: "relu"
  actor_lr: 0.0003
